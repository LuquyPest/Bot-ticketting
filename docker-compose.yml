services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Définir DB_ROOT_PASSWORD dans .env}
      MARIADB_DATABASE: discord_tickets
      MARIADB_USER: botuser
      MARIADB_PASSWORD: ${DB_PASSWORD:?Définir DB_PASSWORD dans .env}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build: .
    restart: on-failure:5
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.json:/app/config.json:ro
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  db_data:
