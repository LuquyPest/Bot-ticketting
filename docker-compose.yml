services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: discord_tickets
      MARIADB_USER: botuser
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build: .
    restart: on-failure:5
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.json:/app/config.json:ro
    expose:
      - "3000"
    networks:
      - proxy
      - default

    labels:
      - "traefik.enable=true"

      # Domaine
      - "traefik.http.routers.ticket.rule=Host(`ticket.sunset-fa.fr`)"
      - "traefik.http.routers.ticket.entrypoints=websecure"
      - "traefik.http.routers.ticket.tls.certresolver=letsencrypt"

      # Service interne
      - "traefik.http.services.ticket.loadbalancer.server.port=3000"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  db_data:

networks:
  proxy:
    external: true
