services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ticketbot_global
      MARIADB_USER: botuser
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  bot:
    build: .
    restart: on-failure:5
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.json:/app/config.json:ro
    expose:
      - "3000"
    networks:
      - proxy
      - default
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

    labels:
      - "traefik.enable=true"

      # Domaine
      - "traefik.http.routers.ticket.rule=Host(`ticket.sunset-fa.fr`)"
      - "traefik.http.routers.ticket.entrypoints=websecure"
      - "traefik.http.routers.ticket.tls.certresolver=letsencrypt"

      # Redirection HTTP → HTTPS
      - "traefik.http.routers.ticket-http.rule=Host(`ticket.sunset-fa.fr`)"
      - "traefik.http.routers.ticket-http.entrypoints=web"
      - "traefik.http.routers.ticket-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"

      # Service interne
      - "traefik.http.services.ticket.loadbalancer.server.port=3000"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  db_data:

networks:
  proxy:
    external: true
